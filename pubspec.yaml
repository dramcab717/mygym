name: mygym
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  google_fonts: ^6.0.0
  firebase_core: ^2.32.0 
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.17.5
  flutter_launcher_icons: ^0.13.1
  http: ^1.2.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpg
    - assets/images/fitness-train-male-strong-power.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpg" 
  min_sdk_android: 21 
